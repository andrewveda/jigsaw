<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Jigsaw Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100dvh;
  overflow: hidden;
  user-select: none;
}

/* ── NAME SCREEN ── */
#nameScreen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100dvh;
  padding: 2rem 1.4rem;
  background: radial-gradient(ellipse at 60% 20%, #1a0a3a 0%, #0a0a1a 70%);
}
.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 1.2rem; line-height: 2;
  color: #FFE600;
  text-shadow: 0 0 24px rgba(255,230,0,0.55);
  text-align: center; margin-bottom: 0.3rem;
}
.logo-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.6rem; color: #00F5FF;
  letter-spacing: 3px; margin-bottom: 2.2rem;
  text-align: center;
}
.form-card {
  width: 100%; max-width: 340px;
  background: #12122a; border: 1px solid #2a2a5a;
  border-radius: 18px; padding: 1.8rem 1.4rem;
  display: flex; flex-direction: column; gap: 1.1rem;
}
.field-label {
  font-size: 0.7rem; font-weight: 700;
  color: #00F5FF; letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 0.35rem; display: block;
}
.form-card input, .form-card select {
  width: 100%; padding: 0.9rem 1rem;
  background: #060610; border: 1px solid #2a2a5a;
  border-radius: 10px; font-size: 1rem; color: #fff;
  outline: none; font-family: 'DM Sans', sans-serif;
  -webkit-appearance: none; appearance: none;
}
.form-card input:focus, .form-card select:focus {
  border-color: #00F5FF;
  box-shadow: 0 0 0 2px rgba(0,245,255,0.12);
}
.form-card select option { background: #12122a; }
.start-btn {
  width: 100%; padding: 1rem;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.72rem; letter-spacing: 1px;
  background: #FFE600; color: #000;
  border: none; border-radius: 12px; cursor: pointer;
  box-shadow: 0 0 22px rgba(255,230,0,0.35);
  transition: transform 0.12s;
}
.start-btn:active { transform: scale(0.96); }

/* ── PUZZLE SCREEN ── */
#puzzleScreen {
  display: none; flex-direction: column;
  height: 100dvh; overflow: hidden;
}

/* Commentary */
.commentary {
  padding: 0.55rem 3.5rem 0.55rem 1rem;
  text-align: center;
  font-size: 0.82rem; font-weight: 600;
  color: #FF2D78; min-height: 38px;
  background: #0a0a1a; border-bottom: 1px solid #1a1a3a;
  transition: opacity 0.25s; flex-shrink: 0;
  line-height: 1.35;
}

/* Progress */
.prog-wrap {
  padding: 0.4rem 0.9rem;
  background: #0a0a1a; border-bottom: 1px solid #1a1a3a;
  flex-shrink: 0;
}
.prog-track {
  height: 5px; background: #1e1e45; border-radius: 3px; overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #00F5FF, #39FF14);
  border-radius: 3px; width: 0%;
  transition: width 0.4s ease;
  box-shadow: 0 0 6px rgba(57,255,20,0.5);
}

/* Floating mute button */
.mute-btn {
  position: absolute;
  top: 10px; left: 10px;
  z-index: 20;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(13,13,34,0.85);
  border: 1.5px solid #2a2a5a;
  font-size: 1.1rem;
  cursor: pointer; color: #fff;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  transition: border-color 0.2s, transform 0.12s;
}
.mute-btn:active { transform: scale(0.92); }
.mute-btn:hover  { border-color: #00F5FF; }

/* Loading overlay */
#loadingOverlay {
  position: absolute; inset: 0;
  background: #0d0d22;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1rem; z-index: 10;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid #1e1e45;
  border-top-color: #00F5FF;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.55rem; color: #555; letter-spacing: 2px;
}

/* Main puzzle canvas area */
.puzzle-area {
  flex: 1; overflow: hidden; position: relative;
  background: #0d0d22; touch-action: none;
}

/* Red Flash Animation */
@keyframes redPulse {
  0%   { box-shadow: inset 0 0 60px rgba(255,0,50,0.85); }
  100% { box-shadow: inset 0 0 0px rgba(255,0,50,0); }
}
.flash-red { animation: redPulse 0.4s ease-out; }

#puzzleCanvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  touch-action: none;
}

/* ── WIN SCREEN ── */
#winScreen {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100dvh; padding: 2rem 1.2rem;
  text-align: center;
  background: radial-gradient(ellipse at 50% 30%, #0d2a0d 0%, #0a0a1a 70%);
}
.win-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 1rem; line-height: 2;
  color: #39FF14;
  text-shadow: 0 0 20px rgba(57,255,20,0.6);
  margin-bottom: 0.5rem;
}
.win-player { font-size: 0.95rem; color: #00F5FF; margin-bottom: 1.2rem; }
.win-img {
  width: 100%; max-width: 300px;
  border-radius: 12px; border: 2px solid #39FF14;
  box-shadow: 0 0 28px rgba(57,255,20,0.35);
  margin-bottom: 1.4rem;
}
.win-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 0.8rem; width: 100%; max-width: 300px; margin-bottom: 1.6rem;
}
.win-stat {
  background: #12122a; border: 1px solid #2a2a5a;
  border-radius: 12px; padding: 0.9rem 0.5rem;
}
.win-stat-val {
  font-family: 'Press Start 2P', monospace;
  font-size: 0.95rem; color: #FFE600; display: block;
}
.win-stat-lbl { font-size: 0.7rem; color: #888; margin-top: 4px; display: block; }
.again-btn {
  padding: 0.9rem 2rem;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.68rem; letter-spacing: 1px;
  background: #39FF14; color: #000;
  border: none; border-radius: 12px; cursor: pointer;
  box-shadow: 0 0 20px rgba(57,255,20,0.4);
}
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div id="nameScreen">
  <div class="logo">JIGSAW</div>
  <div class="logo-sub">PUZZLE QUEST</div>
  <div class="form-card">
    <div>
      <label class="field-label">Your Name</label>
      <input type="text" id="nameInput" placeholder="Enter your name" autocomplete="off"/>
    </div>
    <div>
      <label class="field-label">Department</label>
      <select id="deptSelect">
        <option value="">-- Select Department --</option>
        <option>Cyber Security</option><option>EIE</option>
        <option>CSE-1</option><option>CSE-2</option><option>CSE-3</option>
        <option>Mechanical Engineering</option>
        <option>ECE-1</option><option>ECE-2</option><option>ECE-3</option>
        <option>AI DS-1</option><option>AI DS-2</option>
        <option>Agri and Civil</option><option>EEE</option>
        <option>Medical Electronics</option>
        <option>IT-1</option><option>IT-2</option>
      </select>
    </div>
    <button class="start-btn" onclick="startGame()">▶ START PUZZLE</button>
  </div>
</div>

<!-- PUZZLE SCREEN -->
<div id="puzzleScreen">
  <div class="commentary" id="commentary">Loading puzzle…</div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>
  <div class="puzzle-area" id="puzzleArea">
    <!-- Floating mute button inside puzzle area so it's positioned relative to it -->
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="Toggle sound">🔊</button>
    <!-- Loading overlay -->
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text">LOADING…</div>
    </div>
    <canvas id="puzzleCanvas"></canvas>
  </div>
</div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <div class="win-title">PUZZLE<br>COMPLETE!</div>
  <div class="win-player" id="winPlayer"></div>
  <img id="winImg" class="win-img" alt="Solved puzzle"/>
  <div class="win-stats">
    <div class="win-stat">
      <span class="win-stat-val" id="wTime">-</span>
      <span class="win-stat-lbl">Time</span>
    </div>
    <div class="win-stat">
      <span class="win-stat-val" id="wMoves">-</span>
      <span class="win-stat-lbl">Moves</span>
    </div>
  </div>
  <button class="again-btn" onclick="playAgain()">▶ PLAY AGAIN</button>
</div>

<script>
/* ════════════════════════════════
   CONFIG
════════════════════════════════ */

const _p           = new URLSearchParams(location.search);
const IMAGE_URL    = _p.get("imageUrl") || "https://raw.githubusercontent.com/andrewveda/SRM-VEC-English-PWA/db8b23b2c55fe5c176a928628ac078611c614441/assets/51LMkrllR3S._AC_UF1000%2C1000_QL80_.jpg";
const COLS         = parseInt(_p.get("cols"))  || 4;
const ROWS         = parseInt(_p.get("rows"))  || 4;
const PUZZLE_TITLE = _p.get("title") || "Puzzle";
const SUPABASE_URL = "https://yellow-lab-4999.andrewveda.workers.dev/functions/v1/logQuest";
const TOTAL        = COLS * ROWS;
  
/* ════════════════════════════════
   STATE
════════════════════════════════ */
let canvas, ctx;
let playerName = "", playerDept = "";
let img = null;
let cw, ch, pw, ph;
let boardX = 0, boardY = 0;
let pieces = [];
let selectedPiece = null;

let isDragging   = false;
let dragAnchor   = null;
let startPointerX = 0, startPointerY = 0;
let currentPointerX = 0, currentPointerY = 0;
const DRAG_THRESHOLD = 7;

let placed = 0, moves = 0;
let startTime = null, timerInterval = null;
let isMuted = false;

/* ════════════════════════════════
   DOM READY — bind canvas once
════════════════════════════════ */
document.addEventListener("DOMContentLoaded", () => {
  canvas = document.getElementById("puzzleCanvas");
  ctx    = canvas.getContext("2d");

  // Restore saved name/dept
  const n = localStorage.getItem("jigName");
  const d = localStorage.getItem("jigDept");
  if (n) document.getElementById("nameInput").value  = n;
  if (d) document.getElementById("deptSelect").value = d;

  // Attach all pointer listeners here — canvas is guaranteed to exist
  canvas.addEventListener("mousedown",  onDown,  { passive: false });
  canvas.addEventListener("mousemove",  onMove,  { passive: false });
  canvas.addEventListener("mouseup",    onUp,    { passive: false });
  canvas.addEventListener("mouseleave", onUp,    { passive: false });
  canvas.addEventListener("touchstart", onDown,  { passive: false });
  canvas.addEventListener("touchmove",  onMove,  { passive: false });
  canvas.addEventListener("touchend",   onUp,    { passive: false });
});

/* ════════════════════════════════
   WEB SPEECH  — debounced cancel
════════════════════════════════ */
const synth = window.speechSynthesis;
let speakTimeout = null;

function speak(txt) {
  if (isMuted || !synth) return;
  // Debounce rapid calls so utterances don't stack
  clearTimeout(speakTimeout);
  speakTimeout = setTimeout(() => {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.rate = 1.05; u.pitch = 1.1;
    synth.speak(u);
  }, 80);
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById("muteBtn").textContent = isMuted ? "🔇" : "🔊";
  if (isMuted) { clearTimeout(speakTimeout); synth.cancel(); }
}

/* ════════════════════════════════
   COMMENTARY
════════════════════════════════ */
const correctLines = [
  n => `Yes! Perfect match! 🦅`,
  n => `Snap! That piece is locked! 🔥`,
  n => `Found its home! Keep moving ${n}! 🎯`,
  n => `Absolute lock! Progressing! ⚡`,
];
const milestones = {
  25: n => `${n} locked 25% of the frame! 🎨`,
  50: n => `Half the puzzle locked! 💪`,
  75: n => `75% locked! Almost home! 🏁`,
};

function setCommentary(txt) {
  const el = document.getElementById("commentary");
  el.style.opacity = 0;
  setTimeout(() => { el.textContent = txt; el.style.opacity = 1; }, 180);
  speak(txt);
}

/* ════════════════════════════════
   TIMER
════════════════════════════════ */
function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {}, 500); // kept alive for elapsed()
}
function elapsed() {
  return startTime ? Math.floor((Date.now() - startTime) / 1000) : 0;
}

/* ════════════════════════════════
   START GAME
════════════════════════════════ */
function startGame() {
  const n = document.getElementById("nameInput").value.trim();
  const d = document.getElementById("deptSelect").value;
  if (!n) { alert("Please enter your name!"); return; }
  if (!d) { alert("Please select your department!"); return; }
  playerName = n; playerDept = d;
  localStorage.setItem("jigName", n);
  localStorage.setItem("jigDept", d);
  document.getElementById("nameScreen").style.display = "none";
  document.getElementById("puzzleScreen").style.display = "flex";
  initPuzzle();
}

/* ════════════════════════════════
   PUZZLE INIT
════════════════════════════════ */
function initPuzzle() {
  pieces = []; selectedPiece = null;
  isDragging = false; dragAnchor = null;
  placed = 0; moves = 0;
  clearInterval(timerInterval); startTime = null;

  document.getElementById("progFill").style.width = "0%";
  document.getElementById("loadingOverlay").style.display = "flex";

  // Reuse already-loaded image if available (fixes win-screen reload bug)
  if (img && img.complete && img.naturalWidth > 0) {
    buildPuzzle();
  } else {
    img = new Image();
    img.crossOrigin = "anonymous";
    img.onload  = buildPuzzle;
    img.onerror = () => setCommentary("⚠️ Image failed to load. Check connection.");
    img.src = IMAGE_URL;
  }
}

/* ════════════════════════════════
   BUILD PIECES & SHUFFLE
════════════════════════════════ */
function buildPuzzle() {
  const area = canvas.parentElement;
  const dpr  = window.devicePixelRatio || 1;
  cw = area.clientWidth;
  ch = area.clientHeight;
  canvas.width  = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width  = cw + "px";
  canvas.style.height = ch + "px";
  ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  // Preserve image aspect ratio — fit board inside available area
  const pad    = 10;
  const imgAR  = img.naturalWidth / img.naturalHeight;
  const boardAR = (COLS / ROWS) * imgAR;

  const maxW = cw - pad * 2;
  const maxH = ch - pad * 2;

  let boardW, boardH;
  if (maxW / maxH > boardAR) {
    boardH = maxH;
    boardW = Math.floor(boardH * boardAR);
  } else {
    boardW = maxW;
    boardH = Math.floor(boardW / boardAR);
  }

  pw = Math.floor(boardW / COLS);
  ph = Math.floor(boardH / ROWS);
  boardX = Math.floor((cw - pw * COLS) / 2);
  boardY = Math.floor((ch - ph * ROWS) / 2);

  // Build shuffled slots — guarantee no piece starts solved
  let slots;
  do {
    slots = Array.from({ length: TOTAL }, (_, i) => ({ r: Math.floor(i / COLS), c: i % COLS }));
    slots.sort(() => Math.random() - 0.5);
  } while (slots.every((s, i) => s.r === Math.floor(i / COLS) && s.c === i % COLS));

  pieces = [];
  let idx = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const slot = slots[idx++];
      pieces.push({ id: pieces.length, tr: r, tc: c, row: slot.r, col: slot.c, locked: false });
    }
  }

  // Pre-lock any accidentally correct pieces from shuffle
  pieces.forEach(p => { if (p.row === p.tr && p.col === p.tc) p.locked = true; });
  placed = pieces.filter(p => p.locked).length;
  updateProgress();

  document.getElementById("loadingOverlay").style.display = "none";
  drawAll();
  startTimer();
  setTimeout(() => setCommentary(`Drag or tap pieces to solve it, ${playerName}! 🧩`), 400);
}

/* ════════════════════════════════
   NO CLUSTERING — single piece only
════════════════════════════════ */
function getCluster(p) { return [p]; }

/* ════════════════════════════════
   RED FLASH
════════════════════════════════ */
function triggerRedFlash() {
  const area = document.getElementById("puzzleArea");
  area.classList.remove("flash-red");
  void area.offsetWidth;
  area.classList.add("flash-red");
}

/* ════════════════════════════════
   DRAWING
════════════════════════════════ */
function drawAll() {
  if (!canvas || !ctx) return;
  ctx.clearRect(0, 0, cw, ch);

  // Board outline
  ctx.strokeStyle = "rgba(0,245,255,0.15)";
  ctx.lineWidth   = 1.5;
  ctx.strokeRect(boardX, boardY, pw * COLS, ph * ROWS);

  const draggingCluster = (isDragging && dragAnchor) ? getCluster(dragAnchor) : [];
  const draggingIds     = new Set(draggingCluster.map(p => p.id));

  // Tap-selection cluster
  let tapClusterIds = new Set();
  if (!isDragging && selectedPiece) {
    getCluster(selectedPiece).forEach(p => tapClusterIds.add(p.id));
  }

  // Draw non-dragging pieces first
  for (const p of pieces) {
    if (!draggingIds.has(p.id)) drawPiece(p, 0, 0, false, tapClusterIds.has(p.id));
  }

  // Draw dragging cluster on top
  if (draggingCluster.length) {
    const dx = currentPointerX - startPointerX;
    const dy = currentPointerY - startPointerY;
    for (const p of draggingCluster) drawPiece(p, dx, dy, true, false);
  }
}

function drawPiece(p, offsetX, offsetY, isDragged, isTapSelected) {
  const x = boardX + p.col * pw + offsetX;
  const y = boardY + p.row * ph + offsetY;

  ctx.save();
  roundRect(ctx, x, y, pw, ph, 4);
  ctx.clip();

  const srcW = img.naturalWidth;
  const srcH = img.naturalHeight;
  ctx.drawImage(img,
    p.tc * (srcW / COLS), p.tr * (srcH / ROWS),
    srcW / COLS,           srcH / ROWS,
    x, y, pw, ph
  );

  if (p.locked && isTapSelected) {
    // Correct piece tapped — green glow to confirm, drawn outside clip
    ctx.restore();
    ctx.save();
    ctx.shadowColor = "#39FF14";
    ctx.shadowBlur  = 18;
    roundRect(ctx, x, y, pw, ph, 4);
    ctx.strokeStyle = "rgba(57,255,20,0.9)";
    ctx.lineWidth   = 3;
    ctx.stroke();
    ctx.restore();
    return;
  } else if (!p.locked && (isDragged || isTapSelected)) {
    ctx.strokeStyle = "#FFE600";
    ctx.lineWidth   = 3;
    ctx.stroke();
    ctx.fillStyle   = "rgba(255,230,0,0.15)";
    ctx.fillRect(x, y, pw, ph);
  } else if (!p.locked) {
    ctx.strokeStyle = "rgba(255,255,255,0.12)";
    ctx.lineWidth   = 1;
    ctx.stroke();
  }
  // locked + not selected → no border, fully seamless
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

/* ════════════════════════════════
   EXECUTE MOVE
════════════════════════════════ */
function executeClusterMove(anchor, deltaR, deltaC) {
  if (deltaR === 0 && deltaC === 0) return false;

  const cluster    = getCluster(anchor);
  const clusterIds = new Set(cluster.map(p => p.id));

  // Validate: no out-of-bounds, no locked cell in destination
  for (const cp of cluster) {
    const tr = cp.row + deltaR;
    const tc = cp.col + deltaC;
    if (tr < 0 || tr >= ROWS || tc < 0 || tc >= COLS) { triggerRedFlash(); return false; }
    const occ = pieces.find(p => p.row === tr && p.col === tc);
    if (occ && occ.locked) { triggerRedFlash(); return false; }
  }

  moves++;

  // Collect displaced pieces (those in destination cells, not in cluster)
  // Map each cluster cell to the piece currently occupying its target, before any moves
  const displacedMap = new Map(); // displaced piece → { fromR, fromC } before move
  for (const cp of cluster) {
    const tr = cp.row + deltaR;
    const tc = cp.col + deltaC;
    const occ = pieces.find(p => p.row === tr && p.col === tc && !clusterIds.has(p.id));
    if (occ && !displacedMap.has(occ.id)) {
      displacedMap.set(occ.id, { row: occ.row, col: occ.col, piece: occ });
    }
  }

  // Move cluster forward
  for (const cp of cluster) { cp.row += deltaR; cp.col += deltaC; }

  // Move each displaced piece to where the first cluster piece that displaced it came from
  // Use a stable approach: find the cluster piece whose target was their origin
  for (const [, { row: fromR, col: fromC, piece: dp }] of displacedMap) {
    // The cluster piece that was at (fromR - deltaR, fromC - deltaC) moved to (fromR, fromC)
    // So dp should go to (fromR - deltaR, fromC - deltaC) — the cluster piece's old position
    dp.row = fromR - deltaR;
    dp.col = fromC - deltaC;
  }

  // Check for new locks
  let newLocks = 0;
  for (const p of pieces) {
    if (!p.locked && p.row === p.tr && p.col === p.tc) { p.locked = true; newLocks++; }
  }
  placed = pieces.filter(p => p.locked).length;
  updateProgress();

  if (newLocks > 0) {
    confetti({ particleCount: 25, spread: 45, origin: { y: 0.5 }, colors: ["#FFE600","#00F5FF","#39FF14"] });

    // Fixed milestone detection: check if placed count crossed a threshold
    const pct = Math.round(placed / TOTAL * 100);
    // Milestone triggers when we just crossed 25/50/75 — compare before and after
    const prevPct = Math.round((placed - newLocks) / TOTAL * 100);
    const milestone = [25, 50, 75].find(m => prevPct < m && pct >= m);
    const msg = milestone
      ? milestones[milestone](playerName)
      : correctLines[Math.floor(Math.random() * correctLines.length)](playerName);
    setCommentary(msg);

    if (placed === TOTAL) setTimeout(showWin, 700);
  }
  // No red flash on valid-but-no-lock moves — neutral feedback only

  return true;
}

/* ════════════════════════════════
   POINTER HANDLERS
════════════════════════════════ */
function getPos(e) {
  const rect   = canvas.getBoundingClientRect();
  const scaleX = cw / rect.width;
  const scaleY = ch / rect.height;
  const src    = (e.touches && e.touches.length) ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
}

function hitPiece(x, y) {
  const col = Math.floor((x - boardX) / pw);
  const row = Math.floor((y - boardY) / ph);
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return null;
  return pieces.find(p => p.row === row && p.col === col) || null;
}

function onDown(e) {
  e.preventDefault();
  const { x, y } = getPos(e);
  const p = hitPiece(x, y);
  if (!p) return;
  if (p.locked) {
    // Briefly show green glow to confirm correct placement, then clear
    selectedPiece = p;
    drawAll();
    setTimeout(() => { if (selectedPiece === p) { selectedPiece = null; drawAll(); } }, 600);
    return;
  }

  dragAnchor     = p;
  startPointerX  = x; startPointerY  = y;
  currentPointerX = x; currentPointerY = y;
  isDragging     = false;
}

function onMove(e) {
  if (!dragAnchor) return;
  e.preventDefault();
  const { x, y } = getPos(e);
  currentPointerX = x; currentPointerY = y;

  if (!isDragging) {
    if (Math.hypot(x - startPointerX, y - startPointerY) > DRAG_THRESHOLD) {
      isDragging    = true;
      selectedPiece = null; // cancel any pending tap selection
    }
  }
  if (isDragging) drawAll();
}

function onUp(e) {
  if (!dragAnchor) return;
  e.preventDefault();

  if (isDragging) {
    const deltaCol = Math.round((currentPointerX - startPointerX) / pw);
    const deltaRow = Math.round((currentPointerY - startPointerY) / ph);
    if (deltaCol !== 0 || deltaRow !== 0) executeClusterMove(dragAnchor, deltaRow, deltaCol);
    isDragging = false;
    dragAnchor = null;
    drawAll();
    return;
  }

  // TAP logic
  const p = dragAnchor;
  dragAnchor = null;

  if (!selectedPiece) {
    selectedPiece = p;
    drawAll();
    return;
  }

  // Tapping empty area or same piece → deselect
  if (selectedPiece.id === p.id) {
    selectedPiece = null;
    drawAll();
    return;
  }

  // Tapping within same cluster → shift selection to tapped piece
  const cluster = getCluster(selectedPiece);
  if (cluster.some(cp => cp.id === p.id)) {
    selectedPiece = p;
    drawAll();
    return;
  }

  // Tap second piece to swap
  const deltaR = p.row - selectedPiece.row;
  const deltaC = p.col - selectedPiece.col;
  executeClusterMove(selectedPiece, deltaR, deltaC);
  selectedPiece = null;
  drawAll();
}

/* ════════════════════════════════
   CANVAS CLICK ON EMPTY SPACE → DESELECT
════════════════════════════════ */
canvas && canvas.addEventListener("click", (e) => {
  if (!selectedPiece) return;
  const { x, y } = getPos(e);
  if (!hitPiece(x, y)) { selectedPiece = null; drawAll(); }
}, { passive: false });

/* ════════════════════════════════
   PROGRESS
════════════════════════════════ */
function updateProgress() {
  const pct = Math.round(placed / TOTAL * 100);
  document.getElementById("progFill").style.width = pct + "%";
}

/* ════════════════════════════════
   WIN
════════════════════════════════ */
function showWin() {
  clearInterval(timerInterval);
  const s   = elapsed();
  const m   = Math.floor(s / 60), sec = s % 60;
  const timeStr = `${m}:${sec.toString().padStart(2, "0")}`;

  const end = Date.now() + 3000;
  (function frame() {
    confetti({ particleCount: 6, angle:  60, spread: 55, origin: { x: 0 }, colors: ["#FFE600","#00F5FF","#39FF14","#FF2D78"] });
    confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors: ["#FFE600","#00F5FF","#39FF14","#FF2D78"] });
    if (Date.now() < end) requestAnimationFrame(frame);
  }());

  document.getElementById("puzzleScreen").style.display = "none";
  document.getElementById("winScreen").style.display    = "flex";
  document.getElementById("winPlayer").textContent = `${playerName} · ${playerDept}`;
  document.getElementById("wTime").textContent     = timeStr;
  document.getElementById("wMoves").textContent    = moves;

  // Reuse the already-loaded image object — no re-fetch
  document.getElementById("winImg").src = img.src;

  setCommentary(`Congratulations ${playerName}! Solved in ${timeStr}!`);
  sendToSupabase({ student_name: playerName, department: playerDept, time_spent: s, moves, quest_id: "Jigsaw-HybridSwap" });
}

async function sendToSupabase(payload) {
  try {
    await fetch(SUPABASE_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
  } catch (e) { console.warn("Supabase log dropped:", e); }
}

/* ════════════════════════════════
   PLAY AGAIN
════════════════════════════════ */
function playAgain() {
  document.getElementById("winScreen").style.display    = "none";
  document.getElementById("puzzleScreen").style.display = "flex";
  initPuzzle();
}

/* ════════════════════════════════
   RESIZE
════════════════════════════════ */
window.addEventListener("resize", () => {
  if (document.getElementById("puzzleScreen").style.display === "flex" && img?.complete) buildPuzzle();
});
</script>
