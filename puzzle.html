<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Puzzle Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#0a0a1a;color:#fff;min-height:100dvh;overflow:hidden;user-select:none}

.top-nav{display:flex;align-items:center;gap:8px;padding:0.55rem 0.75rem;background:#0a0a1a;border-bottom:1px solid #111130;flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;background:#12122a;border:1px solid #1e1e45;border-radius:8px;color:#888;font-size:0.68rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;text-decoration:none;font-family:'DM Sans',sans-serif}
.nav-btn:active{background:#1e1e45;color:#fff}
.nav-btn.prev-btn{padding:5px 8px}
.puzzle-nav-info{flex:1;text-align:center;min-width:0}
.puzzle-nav-title{font-size:0.65rem;font-weight:700;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.puzzle-nav-author{font-size:0.55rem;color:#444;margin-top:1px}
.nav-btn.next-btn{background:#1a1a3a;border-color:#2a2a5a;color:#00F5FF}
.nav-btn.next-btn:active{background:#2a2a5a}
.nav-btn.disabled-btn{opacity:0.25;pointer-events:none}

.commentary{padding:0.5rem 3.5rem 0.5rem 0.9rem;font-size:0.8rem;font-weight:600;color:#FF2D78;min-height:36px;background:#0a0a1a;border-bottom:1px solid #111130;transition:opacity 0.25s;flex-shrink:0;line-height:1.35;text-align:center}

.prog-wrap{padding:0.35rem 0.9rem;background:#0a0a1a;border-bottom:1px solid #111130;flex-shrink:0;display:flex;align-items:center;gap:8px}
.prog-track{flex:1;height:5px;background:#1e1e45;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#00F5FF,#39FF14);border-radius:3px;width:0%;transition:width 0.4s ease;box-shadow:0 0 6px rgba(57,255,20,0.4)}
.prog-label{font-size:0.6rem;color:#333;font-weight:700;white-space:nowrap}

.puzzle-screen{display:none;flex-direction:column;height:100dvh;overflow:hidden}
.mute-btn{position:absolute;top:10px;right:10px;z-index:20;width:36px;height:36px;border-radius:50%;background:rgba(13,13,34,0.85);border:1px solid #2a2a5a;font-size:1rem;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:border-color 0.2s,transform 0.12s}
.mute-btn:active{transform:scale(0.92)}
#loadingOverlay{position:absolute;inset:0;background:#0d0d22;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:10}
.spinner{width:40px;height:40px;border:3px solid #1e1e45;border-top-color:#00F5FF;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Press Start 2P',monospace;font-size:0.5rem;color:#444;letter-spacing:2px}
.puzzle-area{flex:1;overflow:hidden;position:relative;background:#0d0d22;touch-action:none}
#puzzleCanvas{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none}
@keyframes redPulse{0%{box-shadow:inset 0 0 60px rgba(255,0,50,0.85)}100%{box-shadow:inset 0 0 0 rgba(255,0,50,0)}}
.flash-red{animation:redPulse 0.4s ease-out}

#winScreen{display:none;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1.5rem 1.2rem 2.5rem;background:radial-gradient(ellipse at 50% 20%,#0d2a0d 0%,#0a0a1a 70%);text-align:center}
.win-title{font-family:'Press Start 2P',monospace;font-size:0.9rem;line-height:2.2;color:#39FF14;text-shadow:0 0 20px rgba(57,255,20,0.5);margin-bottom:0.3rem}
.win-player{font-size:0.85rem;color:#00F5FF;margin-bottom:0.2rem}
.win-puzzle-name{font-size:0.72rem;color:#555;margin-bottom:1rem}
.win-img{width:100%;max-width:280px;border-radius:12px;border:2px solid #39FF14;box-shadow:0 0 24px rgba(57,255,20,0.3);margin-bottom:1.2rem}
.win-stats{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;width:100%;max-width:280px;margin-bottom:1.4rem}
.win-stat{background:#12122a;border:1px solid #1e1e45;border-radius:12px;padding:0.8rem 0.5rem}
.win-stat-val{font-family:'Press Start 2P',monospace;font-size:0.85rem;color:#FFE600;display:block}
.win-stat-lbl{font-size:0.65rem;color:#555;margin-top:4px;display:block}
.win-actions{display:flex;flex-direction:column;gap:0.7rem;width:100%;max-width:280px}
.win-btn{padding:0.85rem 1.5rem;font-family:'Press Start 2P',monospace;font-size:0.62rem;letter-spacing:1px;border:none;border-radius:12px;cursor:pointer;transition:transform 0.12s}
.win-btn:active{transform:scale(0.97)}
.btn-next{background:#00F5FF;color:#000;box-shadow:0 0 18px rgba(0,245,255,0.3)}
.btn-again{background:#1e1e45;color:#888;border:1px solid #2a2a5a}
.btn-back{background:#12122a;color:#555;border:1px solid #1e1e45;font-size:0.55rem}
.win-streak{font-size:0.65rem;color:#FFB327;margin-bottom:0.6rem}
.cat-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:0.6rem;font-weight:700;margin-bottom:1rem}
.cat-quotes{background:#3a1a5a;color:#B57BFF}
.cat-jokes{background:#3a2a00;color:#FFB327}
.cat-comics{background:#002a3a;color:#00F5FF}
.cat-thirukural{background:#3a0d0d;color:#FF6B6B}
</style>
</head>
<body>

<div id="puzzleScreen" class="puzzle-screen">
  <div class="top-nav">
    <a id="backBtn" href="directory.html" class="nav-btn">← Back</a>
    <div class="puzzle-nav-info">
      <div class="puzzle-nav-title" id="navTitle">—</div>
      <div class="puzzle-nav-author" id="navAuthor">—</div>
    </div>
    <button id="prevPuzzleBtn" class="nav-btn prev-btn" onclick="goToPrev()">‹</button>
    <button id="nextPuzzleBtn" class="nav-btn next-btn" onclick="goToNext()">Next ›</button>
  </div>
  <div class="commentary" id="commentary">Loading…</div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-label" id="progLabel">0 / 0</div>
  </div>
  <div class="puzzle-area" id="puzzleArea">
    <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    <div id="loadingOverlay"><div class="spinner"></div><div class="loading-text">LOADING…</div></div>
    <canvas id="puzzleCanvas"></canvas>
  </div>
</div>

<div id="winScreen">
  <div class="win-title">PUZZLE<br>COMPLETE!</div>
  <div class="win-player" id="winPlayer"></div>
  <div class="win-puzzle-name" id="winPuzzleName"></div>
  <div id="winCatBadge" class="cat-badge"></div>
  <img id="winImg" class="win-img" alt="Solved puzzle"/>
  <div class="win-stats">
    <div class="win-stat"><span class="win-stat-val" id="wTime">-</span><span class="win-stat-lbl">Time</span></div>
    <div class="win-stat"><span class="win-stat-val" id="wMoves">-</span><span class="win-stat-lbl">Moves</span></div>
  </div>
  <div class="win-streak" id="winStreak"></div>
  <div class="win-actions">
    <button class="win-btn btn-next" id="nextPuzzleBtnWin" onclick="goToNext()">▶ NEXT PUZZLE</button>
    <button class="win-btn btn-again" onclick="playAgain()">↺ PLAY AGAIN</button>
    <a class="win-btn btn-back" id="dirBtnWin" href="directory.html">← BACK TO DIRECTORY</a>
  </div>
</div>

<script src="puzzles.js"></script>
<script>
/* ═══════════════════════════════════════════════════
   CONFIG — read puzzle by hash id, look up in PUZZLES
   FIX: no long URL params; everything from puzzles.js
═══════════════════════════════════════════════════ */
const PUZZLE_ID   = location.hash.slice(1) || (PUZZLES[0] && PUZZLES[0].id);
const _puz        = PUZZLES.find(p => p.id === PUZZLE_ID) || PUZZLES[0];

const IMAGE_URL   = _puz.imageUrl;
const COLS        = _puz.cols;
const ROWS        = _puz.rows;
const PUZZLE_TITLE  = _puz.title;
const PUZZLE_AUTHOR = _puz.author;
const PUZZLE_CAT    = _puz.category;
const PUZZLE_DIFF   = _puz.difficulty;
const PLAYER_NAME   = localStorage.getItem("pq_name") || "Player";
const PLAYER_DEPT   = localStorage.getItem("pq_dept") || "";

const _idx  = PUZZLES.findIndex(p => p.id === PUZZLE_ID);
const PREV_ID = _idx > 0               ? PUZZLES[_idx - 1].id : "";
const NEXT_ID = _idx < PUZZLES.length-1 ? PUZZLES[_idx + 1].id : "";

const SUPABASE_URL = "https://yellow-lab-4999.andrewveda.workers.dev/functions/v1/logQuest";
const TOTAL = COLS * ROWS;

/* ═══════════════════════════════
   PROGRESS
═══════════════════════════════ */
function getProgress() { try { return JSON.parse(localStorage.getItem("pq_progress")||"{}"); } catch(e) { return {}; } }
function markSolved(id) { const p=getProgress(); p[id]=true; localStorage.setItem("pq_progress",JSON.stringify(p)); }
function getSolvedCount() { const p=getProgress(); return PUZZLES.filter(x=>p[x.id]).length; }

/* ═══════════════════════════════
   NAVIGATION
═══════════════════════════════ */
function goToNext() { if (NEXT_ID) location.href = "puzzle.html#" + NEXT_ID; }
function goToPrev() { if (PREV_ID) location.href = "puzzle.html#" + PREV_ID; }

function setupNav() {
  document.getElementById("navTitle").textContent   = PUZZLE_TITLE;
  document.getElementById("navAuthor").textContent  = PUZZLE_AUTHOR;
  document.title = PUZZLE_TITLE + " · Puzzle Quest";

  const dirHref = "directory.html?solved=" + PUZZLE_ID;
  document.getElementById("backBtn").href   = dirHref;
  document.getElementById("dirBtnWin").href = dirHref;

  if (!PREV_ID) document.getElementById("prevPuzzleBtn").classList.add("disabled-btn");
  if (!NEXT_ID) {
    document.getElementById("nextPuzzleBtn").classList.add("disabled-btn");
    document.getElementById("nextPuzzleBtnWin").style.display = "none";
  }

  const catColors = {quotes:"cat-quotes",jokes:"cat-jokes",comics:"cat-comics",thirukural:"cat-thirukural"};
  const catLabels = {quotes:"💬 Quotes",jokes:"😄 Jokes",comics:"🎨 Comics",thirukural:"📖 Thirukkural"};
  const badge = document.getElementById("winCatBadge");
  badge.className  = "cat-badge " + (catColors[PUZZLE_CAT] || "");
  badge.textContent = catLabels[PUZZLE_CAT] || PUZZLE_CAT;
}

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let canvas, ctx;
let img = null;
let cw, ch, pw, ph, boardX, boardY;
let pieces = [], selectedPiece = null;
let isDragging = false, dragAnchor = null;
let startPointerX=0, startPointerY=0, currentPointerX=0, currentPointerY=0;
const DRAG_THRESHOLD = 7;
let placed=0, moves=0, startTime=null, isMuted=false;

/* ═══════════════════════════════
   SPEECH
═══════════════════════════════ */
const synth = window.speechSynthesis;
let speakTimeout = null;
function speak(txt) {
  if (isMuted || !synth) return;
  clearTimeout(speakTimeout);
  speakTimeout = setTimeout(() => {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.rate=1.05; u.pitch=1.1; synth.speak(u);
  }, 80);
}
function toggleMute() {
  isMuted = !isMuted;
  document.getElementById("muteBtn").textContent = isMuted ? "🔇" : "🔊";
  if (isMuted) { clearTimeout(speakTimeout); synth.cancel(); }
}

/* ═══════════════════════════════
   COMMENTARY
═══════════════════════════════ */
const correctLines = [
  ()=>`Yes! Perfect match! 🦅`,
  ()=>`Snap! That piece is locked! 🔥`,
  n =>`Found its home! Keep moving ${n}! 🎯`,
  ()=>`Absolute lock! Progressing! ⚡`,
];
const milestones = {
  25: n=>`${n} locked 25%! 🎨`,
  50: ()=>`Half the puzzle locked! 💪`,
  75: ()=>`75% locked! Almost home! 🏁`,
};
function setCommentary(txt) {
  const el = document.getElementById("commentary");
  el.style.opacity = 0;
  setTimeout(() => { el.textContent = txt; el.style.opacity = 1; }, 180);
  speak(txt);
}

/* ═══════════════════════════════
   TIMER — FIX 7: no dummy interval
═══════════════════════════════ */
function startTimer() { startTime = Date.now(); }
function elapsed()    { return startTime ? Math.floor((Date.now()-startTime)/1000) : 0; }

/* ═══════════════════════════════
   DOM READY
═══════════════════════════════ */
document.addEventListener("DOMContentLoaded", () => {
  canvas = document.getElementById("puzzleCanvas");
  ctx    = canvas.getContext("2d");
  canvas.addEventListener("mousedown",  onDown, {passive:false});
  canvas.addEventListener("mousemove",  onMove, {passive:false});
  canvas.addEventListener("mouseup",    onUp,   {passive:false});
  canvas.addEventListener("mouseleave", onUp,   {passive:false});
  canvas.addEventListener("touchstart", onDown, {passive:false});
  canvas.addEventListener("touchmove",  onMove, {passive:false});
  canvas.addEventListener("touchend",   onUp,   {passive:false});
  canvas.addEventListener("click", e => {
    if (!selectedPiece) return;
    const {x,y} = getPos(e);
    if (!hitPiece(x,y)) { selectedPiece=null; drawAll(); }
  }, {passive:false});

  document.getElementById("puzzleScreen").style.display = "flex";
  setupNav();
  initPuzzle();
});

/* ═══════════════════════════════
   PUZZLE INIT
═══════════════════════════════ */
function initPuzzle() {
  pieces=[]; selectedPiece=null; isDragging=false; dragAnchor=null;
  placed=0; moves=0; startTime=null;
  document.getElementById("progFill").style.width = "0%";
  document.getElementById("progLabel").textContent = `0 / ${TOTAL}`;
  document.getElementById("loadingOverlay").style.display = "flex";

  /* FIX 6: don't null img on play-again — reuse the already-loaded image */
  if (img && img.complete && img.naturalWidth > 0) { buildPuzzle(); return; }
  img = new Image();
  img.crossOrigin = "anonymous";
  img.onload  = buildPuzzle;
  img.onerror = () => setCommentary("⚠️ Image failed to load.");
  img.src = IMAGE_URL;
}

/* ═══════════════════════════════
   BUILD PIECES & SHUFFLE
   FIX 1: shuffle until ZERO pieces start in correct position
═══════════════════════════════ */
function buildPuzzle() {
  const area = canvas.parentElement;
  const dpr  = window.devicePixelRatio || 1;
  cw = area.clientWidth; ch = area.clientHeight;
  canvas.width  = cw * dpr; canvas.height = ch * dpr;
  canvas.style.width = cw+"px"; canvas.style.height = ch+"px";
  ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr);

  const pad=10, imgAR=img.naturalWidth/img.naturalHeight;
  const boardAR=(COLS/ROWS)*imgAR;
  const maxW=cw-pad*2, maxH=ch-pad*2;
  let boardW, boardH;
  if (maxW/maxH > boardAR) { boardH=maxH; boardW=Math.floor(boardH*boardAR); }
  else                     { boardW=maxW; boardH=Math.floor(boardW/boardAR); }
  pw=Math.floor(boardW/COLS); ph=Math.floor(boardH/ROWS);
  boardX=Math.floor((cw-pw*COLS)/2); boardY=Math.floor((ch-ph*ROWS)/2);

  /* FIX 1: repeat shuffle until NO piece is in its correct grid position */
  let slots;
  do {
    slots = Array.from({length:TOTAL}, (_,i) => ({r:Math.floor(i/COLS), c:i%COLS}));
    slots.sort(() => Math.random()-0.5);
  } while (slots.some((s,i) => s.r===Math.floor(i/COLS) && s.c===i%COLS));

  pieces = [];
  let idx = 0;
  for (let r=0; r<ROWS; r++) {
    for (let c=0; c<COLS; c++) {
      const slot = slots[idx++];
      /* locked:false guaranteed — shuffle ensures no piece starts correct */
      pieces.push({id:pieces.length, tr:r, tc:c, row:slot.r, col:slot.c, locked:false});
    }
  }
  placed = 0;
  updateProgress();

  document.getElementById("loadingOverlay").style.display = "none";
  drawAll();
  startTimer();
  setTimeout(() => setCommentary(`${PUZZLE_TITLE} — drag or tap to solve, ${PLAYER_NAME}! 🧩`), 400);
}

/* ═══════════════════════════════
   CLUSTER — single piece only
═══════════════════════════════ */
function getCluster(p) { return [p]; }

/* ═══════════════════════════════
   RED FLASH
═══════════════════════════════ */
function triggerRedFlash() {
  const a = document.getElementById("puzzleArea");
  a.classList.remove("flash-red"); void a.offsetWidth; a.classList.add("flash-red");
}

/* ═══════════════════════════════
   DRAWING
═══════════════════════════════ */
function drawAll() {
  if (!canvas||!ctx) return;
  ctx.clearRect(0,0,cw,ch);
  ctx.strokeStyle="rgba(0,245,255,0.12)"; ctx.lineWidth=1.5;
  ctx.strokeRect(boardX,boardY,pw*COLS,ph*ROWS);

  const draggingCluster = (isDragging&&dragAnchor) ? getCluster(dragAnchor) : [];
  const draggingIds     = new Set(draggingCluster.map(p=>p.id));
  const tapClusterIds   = new Set();
  if (!isDragging && selectedPiece) getCluster(selectedPiece).forEach(p=>tapClusterIds.add(p.id));

  for (const p of pieces) if (!draggingIds.has(p.id)) drawPiece(p,0,0,false,tapClusterIds.has(p.id));
  if (draggingCluster.length) {
    const dx=currentPointerX-startPointerX, dy=currentPointerY-startPointerY;
    for (const p of draggingCluster) drawPiece(p,dx,dy,true,false);
  }
}

function drawPiece(p, offsetX, offsetY, isDragged, isTapSelected) {
  const x=boardX+p.col*pw+offsetX, y=boardY+p.row*ph+offsetY;
  ctx.save(); roundRect(ctx,x,y,pw,ph,4); ctx.clip();
  ctx.drawImage(img,
    p.tc*(img.naturalWidth/COLS), p.tr*(img.naturalHeight/ROWS),
    img.naturalWidth/COLS, img.naturalHeight/ROWS,
    x, y, pw, ph);

  if (p.locked && isTapSelected) {
    ctx.restore(); ctx.save();
    ctx.shadowColor="#39FF14"; ctx.shadowBlur=18;
    roundRect(ctx,x,y,pw,ph,4);
    ctx.strokeStyle="rgba(57,255,20,0.9)"; ctx.lineWidth=3; ctx.stroke();
  } else if (!p.locked && (isDragged||isTapSelected)) {
    ctx.strokeStyle="#FFE600"; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle="rgba(255,230,0,0.15)"; ctx.fillRect(x,y,pw,ph);
  } else if (!p.locked) {
    ctx.strokeStyle="rgba(255,255,255,0.1)"; ctx.lineWidth=1; ctx.stroke();
  }
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

/* ═══════════════════════════════════════════════════════════════
   EXECUTE MOVE
   FIX 2: displaced piece landing position validated for all deltas
   FIX 3: full collision check across cluster + all displaced landings
   FIX 4: placed = placed + newLocks (no redundant full-array filter)
═══════════════════════════════════════════════════════════════ */
function executeClusterMove(anchor, deltaR, deltaC) {
  if (deltaR===0 && deltaC===0) return false;

  const cluster    = getCluster(anchor);
  const clusterIds = new Set(cluster.map(p=>p.id));

  /* --- PASS 1: collect displaced pieces and their intended new positions --- */
  const displacedMap = new Map();
  for (const cp of cluster) {
    const tr=cp.row+deltaR, tc=cp.col+deltaC;
    const occ = pieces.find(p=>p.row===tr&&p.col===tc&&!clusterIds.has(p.id));
    if (occ && !displacedMap.has(occ.id)) {
      /* displaced piece goes back to where the cluster piece came from */
      displacedMap.set(occ.id, {
        piece: occ,
        toR: cp.row,   /* FIX 2: always the cluster piece's original cell */
        toC: cp.col
      });
    }
  }

  /* --- PASS 2: build complete final-position map for ALL moving pieces --- */
  /* cluster destinations */
  const finalPositions = new Map();
  for (const cp of cluster) {
    finalPositions.set(cp.id, {r: cp.row+deltaR, c: cp.col+deltaC});
  }
  /* displaced destinations */
  for (const [id,{toR,toC}] of displacedMap) {
    finalPositions.set(id, {r:toR, c:toC});
  }

  /* --- PASS 3: validate ALL final positions --- */
  for (const [id,{r,c}] of finalPositions) {
    /* bounds check */
    if (r<0||r>=ROWS||c<0||c>=COLS) { triggerRedFlash(); return false; }

    /* FIX 3: check for landing on a locked piece */
    const occ = pieces.find(p=>p.row===r&&p.col===c);
    if (occ && occ.locked && !finalPositions.has(occ.id)) { triggerRedFlash(); return false; }

    /* FIX 3: check for two moving pieces landing on the same cell */
    for (const [id2,pos2] of finalPositions) {
      if (id2!==id && pos2.r===r && pos2.c===c) { triggerRedFlash(); return false; }
    }
  }

  /* --- COMMIT --- */
  moves++;
  for (const cp of cluster) { cp.row+=deltaR; cp.col+=deltaC; }
  for (const [,{piece:dp,toR,toC}] of displacedMap) { dp.row=toR; dp.col=toC; }

  /* --- LOCK CHECK — FIX 4: increment placed directly, no full rescan --- */
  let newLocks = 0;
  for (const p of pieces) {
    if (!p.locked && p.row===p.tr && p.col===p.tc) { p.locked=true; newLocks++; }
  }
  placed += newLocks;
  updateProgress();

  if (newLocks > 0) {
    confetti({particleCount:25,spread:45,origin:{y:0.5},colors:["#FFE600","#00F5FF","#39FF14"]});
    const pct     = Math.round(placed/TOTAL*100);
    const prevPct = Math.round((placed-newLocks)/TOTAL*100);
    const milestone = [25,50,75].find(m => prevPct<m && pct>=m);
    const msg = milestone
      ? milestones[milestone](PLAYER_NAME)
      : correctLines[Math.floor(Math.random()*correctLines.length)](PLAYER_NAME);
    setCommentary(msg);
    if (placed===TOTAL) setTimeout(showWin, 700);
  }
  return true;
}

/* ═══════════════════════════════════════════════════════════════
   POINTER HANDLERS
   FIX 5: locked-piece tap uses a separate glowPiece variable,
           never touches selectedPiece — prevents bleed-through
═══════════════════════════════════════════════════════════════ */
function getPos(e) {
  const rect  = canvas.getBoundingClientRect();
  const scaleX=cw/rect.width, scaleY=ch/rect.height;
  const src   = (e.touches&&e.touches.length) ? e.touches[0] : e;
  return {x:(src.clientX-rect.left)*scaleX, y:(src.clientY-rect.top)*scaleY};
}

function hitPiece(x,y) {
  const col=Math.floor((x-boardX)/pw), row=Math.floor((y-boardY)/ph);
  if (row<0||row>=ROWS||col<0||col>=COLS) return null;
  return pieces.find(p=>p.row===row&&p.col===col)||null;
}

let glowPiece = null;   /* FIX 5: separate state for locked-piece confirmation glow */
let glowTimer = null;

function showGlow(p) {
  clearTimeout(glowTimer);
  glowPiece = p;
  drawAll();
  glowTimer = setTimeout(() => { glowPiece=null; drawAll(); }, 600);
}

function drawAll() {
  if (!canvas||!ctx) return;
  ctx.clearRect(0,0,cw,ch);
  ctx.strokeStyle="rgba(0,245,255,0.12)"; ctx.lineWidth=1.5;
  ctx.strokeRect(boardX,boardY,pw*COLS,ph*ROWS);

  const draggingCluster = (isDragging&&dragAnchor) ? getCluster(dragAnchor) : [];
  const draggingIds     = new Set(draggingCluster.map(p=>p.id));

  /* tap-selected cluster (unlocked pieces only) */
  const tapClusterIds = new Set();
  if (!isDragging && selectedPiece) getCluster(selectedPiece).forEach(p=>tapClusterIds.add(p.id));

  for (const p of pieces) {
    if (!draggingIds.has(p.id)) {
      /* FIX 5: glow uses glowPiece, completely separate from selectedPiece */
      const isGlow = glowPiece && p.id===glowPiece.id;
      drawPiece(p, 0, 0, false, tapClusterIds.has(p.id), isGlow);
    }
  }
  if (draggingCluster.length) {
    const dx=currentPointerX-startPointerX, dy=currentPointerY-startPointerY;
    for (const p of draggingCluster) drawPiece(p,dx,dy,true,false,false);
  }
}

function drawPiece(p, offsetX, offsetY, isDragged, isTapSelected, isGlow) {
  const x=boardX+p.col*pw+offsetX, y=boardY+p.row*ph+offsetY;
  ctx.save(); roundRect(ctx,x,y,pw,ph,4); ctx.clip();
  ctx.drawImage(img,
    p.tc*(img.naturalWidth/COLS), p.tr*(img.naturalHeight/ROWS),
    img.naturalWidth/COLS, img.naturalHeight/ROWS,
    x, y, pw, ph);

  /* FIX 5: locked glow drawn via isGlow, never via isTapSelected */
  if (p.locked && isGlow) {
    ctx.restore(); ctx.save();
    ctx.shadowColor="#39FF14"; ctx.shadowBlur=18;
    roundRect(ctx,x,y,pw,ph,4);
    ctx.strokeStyle="rgba(57,255,20,0.9)"; ctx.lineWidth=3; ctx.stroke();
  } else if (!p.locked && (isDragged||isTapSelected)) {
    ctx.strokeStyle="#FFE600"; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle="rgba(255,230,0,0.15)"; ctx.fillRect(x,y,pw,ph);
  } else if (!p.locked) {
    ctx.strokeStyle="rgba(255,255,255,0.1)"; ctx.lineWidth=1; ctx.stroke();
  }
  ctx.restore();
}

function onDown(e) {
  e.preventDefault();
  const {x,y}=getPos(e), p=hitPiece(x,y);
  if (!p) return;
  /* FIX 5: locked tap → separate glow path, selectedPiece untouched */
  if (p.locked) { showGlow(p); return; }
  dragAnchor=p; startPointerX=x; startPointerY=y; currentPointerX=x; currentPointerY=y; isDragging=false;
}

function onMove(e) {
  if (!dragAnchor) return; e.preventDefault();
  const {x,y}=getPos(e); currentPointerX=x; currentPointerY=y;
  if (!isDragging && Math.hypot(x-startPointerX,y-startPointerY)>DRAG_THRESHOLD) {
    isDragging=true; selectedPiece=null;
  }
  if (isDragging) drawAll();
}

function onUp(e) {
  if (!dragAnchor) return; e.preventDefault();
  if (isDragging) {
    const deltaCol=Math.round((currentPointerX-startPointerX)/pw);
    const deltaRow=Math.round((currentPointerY-startPointerY)/ph);
    if (deltaCol!==0||deltaRow!==0) executeClusterMove(dragAnchor,deltaRow,deltaCol);
    isDragging=false; dragAnchor=null; drawAll(); return;
  }

  /* TAP path */
  const p=dragAnchor; dragAnchor=null;
  if (!selectedPiece) { selectedPiece=p; drawAll(); return; }
  if (selectedPiece.id===p.id) { selectedPiece=null; drawAll(); return; }
  if (getCluster(selectedPiece).some(cp=>cp.id===p.id)) { selectedPiece=p; drawAll(); return; }
  const deltaR=p.row-selectedPiece.row, deltaC=p.col-selectedPiece.col;
  executeClusterMove(selectedPiece, deltaR, deltaC);
  selectedPiece=null; drawAll();
}

/* ═══════════════════════════════
   PROGRESS
═══════════════════════════════ */
function updateProgress() {
  document.getElementById("progFill").style.width = Math.round(placed/TOTAL*100)+"%";
  document.getElementById("progLabel").textContent = `${placed} / ${TOTAL}`;
}

/* ═══════════════════════════════
   WIN
═══════════════════════════════ */
function showWin() {
  markSolved(PUZZLE_ID);
  const s=elapsed(), m=Math.floor(s/60), sec=s%60;
  const timeStr=`${m}:${sec.toString().padStart(2,"0")}`;

  const end=Date.now()+3000;
  (function frame(){
    confetti({particleCount:6,angle:60, spread:55,origin:{x:0},colors:["#FFE600","#00F5FF","#39FF14","#FF2D78"]});
    confetti({particleCount:6,angle:120,spread:55,origin:{x:1},colors:["#FFE600","#00F5FF","#39FF14","#FF2D78"]});
    if (Date.now()<end) requestAnimationFrame(frame);
  }());

  document.getElementById("puzzleScreen").style.display="none";
  document.getElementById("winScreen").style.display="flex";
  document.getElementById("winPlayer").textContent=`${PLAYER_NAME} · ${PLAYER_DEPT}`;
  document.getElementById("winPuzzleName").textContent=`"${PUZZLE_TITLE}"`;
  document.getElementById("wTime").textContent=timeStr;
  document.getElementById("wMoves").textContent=moves;
  document.getElementById("winImg").src=img.src;
  document.getElementById("winStreak").textContent=`🏆 ${getSolvedCount()} of ${PUZZLES.length} puzzles solved`;

  setCommentary(NEXT_ID
    ? `Nailed it, ${PLAYER_NAME}! Tap Next Puzzle to keep going! 🚀`
    : `Amazing, ${PLAYER_NAME}! That's the last one! You're done! 🎉`);

  sendToSupabase({student_name:PLAYER_NAME,department:PLAYER_DEPT,time_spent:s,moves,quest_id:"Jigsaw-"+PUZZLE_ID});
}

async function sendToSupabase(payload) {
  try { await fetch(SUPABASE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}); }
  catch(e) { console.warn("Supabase log dropped:",e); }
}

/* FIX 6: playAgain does NOT null img — reuses the already-loaded image */
function playAgain() {
  document.getElementById("winScreen").style.display="none";
  document.getElementById("puzzleScreen").style.display="flex";
  initPuzzle();
}

window.addEventListener("resize", () => {
  if (document.getElementById("puzzleScreen").style.display==="flex" && img?.complete) buildPuzzle();
});
</script>
