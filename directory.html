<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Puzzle Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --ivory:#FAF6EA;
  --ivory-deep:#F0E7CE;
  --card:#FFFDF7;
  --gold:#B8935A;
  --gold-deep:#8C6A34;
  --gold-light:#E4CE9B;
  --ink:#2A2115;
  --ink-soft:#8A7A5C;
  --line:rgba(140,106,52,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--ivory);color:var(--ink);min-height:100dvh;overflow-x:hidden}

.dir-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.dir-glow{position:absolute;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(184,147,90,0.16) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%)}
.dir-glow2{position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(140,106,52,0.12) 0%,transparent 70%);bottom:10px;right:-60px}

.dir-wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:2.2rem 1.2rem 3rem}

.dir-header{text-align:center;margin-bottom:1.8rem}
.dir-icon{font-size:2.4rem;margin-bottom:0.4rem}
.dir-title{font-family:'Cinzel',serif;font-size:1.7rem;font-weight:900;letter-spacing:-0.5px;margin-bottom:0.25rem;background:linear-gradient(135deg,#8C6A34,#C9A961,#8C6A34);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.dir-tagline{font-size:0.78rem;color:var(--ink-soft);font-style:italic}

.quest-list{display:flex;flex-direction:column;gap:0.9rem}

.quest-card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 2px 14px rgba(140,106,52,0.08);transition:border-color 0.15s,box-shadow 0.15s}
.quest-card:active{border-color:var(--gold);box-shadow:0 2px 18px rgba(140,106,52,0.16)}

.quest-main{display:flex;align-items:center;gap:0.9rem;padding:0.85rem 0.9rem;cursor:pointer}
.quest-thumb{width:58px;height:58px;border-radius:12px;object-fit:cover;flex-shrink:0;border:1.5px solid var(--gold-light);background:var(--ivory-deep)}
.quest-thumb.fallback{display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.quest-info{flex:1;min-width:0}
.quest-tag{font-family:'Cinzel',serif;font-size:0.98rem;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quest-desc{font-size:0.68rem;color:var(--ink-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quest-badge{font-size:0.58rem;font-weight:800;color:var(--gold-deep);background:rgba(184,147,90,0.12);border:1px solid rgba(184,147,90,0.4);border-radius:20px;padding:3px 9px;white-space:nowrap;letter-spacing:0.5px}
.quest-arrow{font-size:0.9rem;color:var(--ink-soft);transition:transform 0.2s;flex-shrink:0}
.quest-card.open .quest-arrow{transform:rotate(90deg);color:var(--gold-deep)}

.quest-sub-list{max-height:0;overflow:hidden;transition:max-height 0.3s ease;border-top:1px solid var(--line)}
.quest-card.open .quest-sub-list{max-height:600px}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0.8rem}
.sub-item{display:flex;align-items:center;gap:8px;background:var(--ivory-deep);border:1px solid rgba(184,147,90,0.28);border-radius:12px;padding:7px;cursor:pointer;transition:transform 0.12s,border-color 0.12s}
.sub-item:active{transform:scale(0.96);border-color:var(--gold-deep)}
.sub-thumb{width:38px;height:38px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--ivory)}
.sub-thumb.fallback{display:flex;align-items:center;justify-content:center;font-size:1rem}
.sub-info{min-width:0}
.sub-title{font-size:0.68rem;font-weight:800;color:var(--gold-deep);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-sub{font-size:0.6rem;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.empty-state{text-align:center;color:var(--ink-soft);font-size:0.8rem;padding:3rem 1rem}
</style>
</head>
<body>

<div class="dir-bg"><div class="dir-glow"></div><div class="dir-glow2"></div></div>

<div class="dir-wrap">
  <div class="dir-header">
    <div class="dir-icon">🧩</div>
    <div class="dir-title" id="dirTitle">Puzzle Directory</div>
    <div class="dir-tagline" id="dirTagline">Pick a poster or a full puzzle quest to solve.</div>
  </div>

  <div class="quest-list" id="questList"></div>
</div>

<script src="puzzles.js"></script>
<script>
const DIRECTORY = window.PUZZLE_DIRECTORY || { quests: [] };

document.getElementById("dirTitle").textContent = DIRECTORY.directoryTitle || "Puzzle Directory";
document.getElementById("dirTagline").textContent = DIRECTORY.directoryTagline || "";

const listEl = document.getElementById("questList");

if (!DIRECTORY.quests || !DIRECTORY.quests.length) {
  listEl.innerHTML = `<div class="empty-state">No quests yet — add some to puzzles.js.</div>`;
} else {
  DIRECTORY.quests.forEach(quest => {
    const card = document.createElement("div");
    card.className = "quest-card";

    const main = document.createElement("div");
    main.className = "quest-main";

    const thumb = document.createElement("img");
    thumb.className = "quest-thumb";
    thumb.src = quest.coverImage || (quest.puzzles[0] && quest.puzzles[0].imageUrl) || "";
    thumb.alt = quest.tag;
    thumb.onerror = () => { thumb.replaceWith(fallbackThumb("quest-thumb")); };

    const info = document.createElement("div");
    info.className = "quest-info";
    const tagEl = document.createElement("div");
    tagEl.className = "quest-tag";
    tagEl.textContent = quest.tag || quest.id;
    const descEl = document.createElement("div");
    descEl.className = "quest-desc";
    descEl.textContent = quest.description || "";
    info.appendChild(tagEl);
    info.appendChild(descEl);

    const isCollection = quest.puzzles && quest.puzzles.length > 1;

    const badge = document.createElement("div");
    badge.className = "quest-badge";
    badge.textContent = isCollection ? `${quest.puzzles.length} puzzles` : "1 puzzle";

    main.appendChild(thumb);
    main.appendChild(info);
    main.appendChild(badge);

    if (isCollection) {
      const arrow = document.createElement("div");
      arrow.className = "quest-arrow";
      arrow.textContent = "›";
      main.appendChild(arrow);

      main.onclick = () => card.classList.toggle("open");

      const subList = document.createElement("div");
      subList.className = "quest-sub-list";
      const subGrid = document.createElement("div");
      subGrid.className = "sub-grid";

      quest.puzzles.forEach(p => {
        const item = document.createElement("div");
        item.className = "sub-item";

        const sThumb = document.createElement("img");
        sThumb.className = "sub-thumb";
        sThumb.src = p.imageUrl;
        sThumb.alt = p.title;
        sThumb.onerror = () => { sThumb.replaceWith(fallbackThumb("sub-thumb")); };

        const sInfo = document.createElement("div");
        sInfo.className = "sub-info";
        const sTitle = document.createElement("div");
        sTitle.className = "sub-title";
        sTitle.textContent = p.title;
        const sSub = document.createElement("div");
        sSub.className = "sub-sub";
        sSub.textContent = p.sub || "";
        sInfo.appendChild(sTitle);
        sInfo.appendChild(sSub);

        item.appendChild(sThumb);
        item.appendChild(sInfo);
        item.onclick = (e) => {
          e.stopPropagation();
          goToPuzzle(quest.id, p.id);
        };

        subGrid.appendChild(item);
      });

      subList.appendChild(subGrid);
      card.appendChild(main);
      card.appendChild(subList);
    } else {
      // single puzzle — jump straight in, no expand
      main.onclick = () => goToPuzzle(quest.id, quest.puzzles[0] && quest.puzzles[0].id);
      card.appendChild(main);
    }

    listEl.appendChild(card);
  });
}

function fallbackThumb(cls) {
  const d = document.createElement("div");
  d.className = cls + " fallback";
  d.textContent = "🧩";
  return d;
}

function goToPuzzle(questId, puzzleId) {
  const params = new URLSearchParams();
  params.set("quest", questId);
  if (puzzleId) params.set("puzzle", puzzleId);
  window.location.href = "puzzle.html?" + params.toString();
}
</script>
</body>
</html>
