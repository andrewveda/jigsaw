<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Puzzle Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Press+Start+2P&family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#0a0014;color:#fff;min-height:100dvh;overscroll-behavior:none}

/* ══ NAME / ENTRY SCREEN ══ */
.name-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:2rem 1.4rem;background:#0a0014;position:relative;overflow:hidden}
.ns-glow{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(255,0,200,0.18) 0%,transparent 70%);top:-60px;left:50%;transform:translateX(-50%);pointer-events:none}
.ns-glow2{position:absolute;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(80,0,255,0.2) 0%,transparent 70%);bottom:40px;right:-60px;pointer-events:none}
.ns-crown{font-size:2.6rem;text-align:center;margin-bottom:0.4rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ns-logo{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;text-align:center;line-height:1.1;letter-spacing:-1px;margin-bottom:0.2rem;background:linear-gradient(135deg,#FFD700,#FF6EC7,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ns-tagline{font-size:0.72rem;color:#6644aa;text-align:center;letter-spacing:3px;text-transform:uppercase;margin-bottom:2rem;font-weight:700}
.form-card{width:100%;max-width:340px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:1.6rem 1.4rem;display:flex;flex-direction:column;gap:1rem;backdrop-filter:blur(10px)}
.field-label{font-size:0.62rem;font-weight:800;color:#A78BFA;letter-spacing:2px;text-transform:uppercase;margin-bottom:0.3rem;display:block}
.form-card input,.form-card select{width:100%;padding:0.85rem 1rem;background:rgba(0,0,0,0.4);border:1px solid rgba(167,139,250,0.3);border-radius:10px;font-size:0.95rem;color:#fff;outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;appearance:none;transition:border-color 0.15s}
.form-card input:focus,.form-card select:focus{border-color:#A78BFA;box-shadow:0 0 0 2px rgba(167,139,250,0.15)}
.form-card input::placeholder{color:#443366}
.form-card select option{background:#120a28}
.start-btn{width:100%;padding:1rem;font-family:'Press Start 2P',monospace;font-size:0.65rem;letter-spacing:1px;background:linear-gradient(135deg,#FFD700,#FF6EC7);color:#000;border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:transform 0.12s,opacity 0.12s}
.start-btn:active{transform:scale(0.97);opacity:0.9}

/* ══ DIRECTORY SCREEN ══ */
#directoryScreen{display:none}

/* ── Sticky header ── */
.header{padding:0.9rem 1rem 0;background:#0a0014;position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(255,255,255,0.06)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
.logo-wrap .logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#FFD700,#FF6EC7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-wrap .sub{font-size:0.52rem;color:#4a3370;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-top:2px}
.player-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 10px 5px 6px;cursor:pointer;transition:border-color 0.15s}
.player-chip:active{border-color:#A78BFA}
.player-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#FFD700,#FF6EC7);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;color:#000;flex-shrink:0}
.player-name{font-size:0.68rem;font-weight:700;color:#aaa;max-width:85px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.search-wrap{position:relative;margin-bottom:0.7rem}
.search-wrap input{width:100%;padding:0.6rem 1rem 0.6rem 2.3rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:0.85rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s}
.search-wrap input::placeholder{color:#3a2a55}
.search-wrap input:focus{border-color:#A78BFA}
.search-icon{position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);font-size:0.85rem;color:#3a2a55;pointer-events:none}

/* ── Category tabs ── */
.tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:0.75rem}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:0.65rem;font-weight:800;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#555;transition:all 0.14s;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase}
.tab.active{border-color:transparent;color:#000}
.tab[data-cat="all"].active    {background:linear-gradient(135deg,#FFD700,#FF6EC7)}
.tab[data-cat="quotes"].active {background:#A78BFA;color:#fff}
.tab[data-cat="jokes"].active  {background:#FFD700;color:#000}
.tab[data-cat="comics"].active {background:#00F0FF;color:#000}
.tab[data-cat="thirukural"].active{background:#FF4E8C;color:#fff}

/* ── Progress crown bar ── */
.progress-crown{margin:0.8rem 1rem 0.6rem;padding:0.8rem 1rem;background:rgba(255,255,255,0.03);border:1px solid rgba(255,215,0,0.15);border-radius:14px}
.progress-crown-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-crown-label{font-size:0.6rem;font-weight:800;color:#6644aa;letter-spacing:2px;text-transform:uppercase}
.progress-crown-val{font-size:0.7rem;font-weight:800;color:#FFD700}
.bar-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#A78BFA,#FFD700,#FF6EC7);border-radius:3px;transition:width 0.6s ease}

/* ── Section labels ── */
.section-label{padding:1rem 1rem 0.5rem;display:flex;align-items:center;justify-content:space-between}
.section-label-text{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:900;letter-spacing:-0.3px}
.section-label-text.l-quotes    {color:#A78BFA}
.section-label-text.l-jokes     {color:#FFD700}
.section-label-text.l-comics    {color:#00F0FF}
.section-label-text.l-thirukural{color:#FF4E8C}
.section-count{font-size:0.6rem;font-weight:800;color:#3a2a55;letter-spacing:1px;text-transform:uppercase}

/* ── Puzzle cards — NO IMAGE, pure typographic ── */
.puzzle-list{display:flex;flex-direction:column;gap:10px;padding:0 10px 6px}

.puzzle-card{position:relative;text-decoration:none;display:block;border-radius:16px;overflow:hidden;transition:transform 0.13s;cursor:pointer}
.puzzle-card:active{transform:scale(0.975)}

/* Big coloured background is the card face */
.card-face{padding:1.1rem 1rem 1rem;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}

/* Category colour palettes */
.card-face.cat-quotes    {background:#1a0a3a}
.card-face.cat-jokes     {background:#1a1400}
.card-face.cat-comics    {background:#001a2a}
.card-face.cat-thirukural{background:#1a0016}

/* Big decorative letter watermark */
.card-watermark{position:absolute;right:-8px;bottom:-14px;font-family:'Playfair Display',serif;font-size:6rem;font-weight:900;line-height:1;opacity:0.07;pointer-events:none;user-select:none}
.cat-quotes     .card-watermark{color:#A78BFA}
.cat-jokes      .card-watermark{color:#FFD700}
.cat-comics     .card-watermark{color:#00F0FF}
.cat-thirukural .card-watermark{color:#FF4E8C}

/* Left accent stripe */
.card-face::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.cat-quotes     .card-face::before{background:#A78BFA}
.cat-jokes      .card-face::before{background:#FFD700}
.cat-comics     .card-face::before{background:#00F0FF}
.cat-thirukural .card-face::before{background:#FF4E8C}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:0.5rem}
.card-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;line-height:1.2;flex:1;min-width:0}
.cat-quotes     .card-title{color:#D4BFFF}
.cat-jokes      .card-title{color:#FFF176}
.cat-comics     .card-title{color:#B2F5FF}
.cat-thirukural .card-title{color:#FFAACF}

.done-badge{flex-shrink:0;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;margin-top:1px}
.cat-quotes     .done-badge{background:rgba(167,139,250,0.2)}
.cat-jokes      .done-badge{background:rgba(255,215,0,0.2)}
.cat-comics     .done-badge{background:rgba(0,240,255,0.2)}
.cat-thirukural .done-badge{background:rgba(255,78,140,0.2)}

.card-author{font-size:0.65rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:0.5rem}
.cat-quotes     .card-author{color:#6a4aa0}
.cat-jokes      .card-author{color:#7a6a00}
.cat-comics     .card-author{color:#006a7a}
.cat-thirukural .card-author{color:#7a1a4a}

.card-footer{display:flex;align-items:center;justify-content:space-between}
.diff-pill{font-size:0.58rem;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}
.diff-easy   {background:rgba(57,255,20,0.12);color:#39FF14;border:1px solid rgba(57,255,20,0.2)}
.diff-medium {background:rgba(255,180,0,0.12);color:#FFB400;border:1px solid rgba(255,180,0,0.2)}
.diff-hard   {background:rgba(255,45,120,0.12);color:#FF2D78;border:1px solid rgba(255,45,120,0.2)}
.pieces-tag{font-size:0.6rem;font-weight:800;letter-spacing:0.5px}
.cat-quotes     .pieces-tag{color:#5a3a8a}
.cat-jokes      .pieces-tag{color:#5a4a00}
.cat-comics     .pieces-tag{color:#005a6a}
.cat-thirukural .pieces-tag{color:#5a0a3a}

/* ── Play arrow overlay on hover ── */
.card-play{position:absolute;top:50%;right:1rem;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;opacity:0.35;transition:opacity 0.15s}
.cat-quotes     .card-play{background:rgba(167,139,250,0.3)}
.cat-jokes      .card-play{background:rgba(255,215,0,0.3)}
.cat-comics     .card-play{background:rgba(0,240,255,0.3)}
.cat-thirukural .card-play{background:rgba(255,78,140,0.3)}
.puzzle-card:active .card-play{opacity:0.8}

/* ── Empty ── */
.empty{text-align:center;padding:3rem 2rem;color:#3a2a55}
.empty-icon{font-size:2.5rem;margin-bottom:0.75rem}
.empty p{font-size:0.8rem;line-height:1.6}

.footer{text-align:center;padding:1.5rem 1rem 3rem;font-size:0.55rem;color:#1e1030;letter-spacing:2px;text-transform:uppercase;border-top:1px solid rgba(255,255,255,0.04);margin-top:0.5rem}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.puzzle-card{animation:fadeUp 0.28s ease both}
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div id="nameScreen" class="name-screen">
  <div class="ns-glow"></div>
  <div class="ns-glow2"></div>
  <div class="ns-crown">👑</div>
  <div class="ns-logo">Puzzle Quest</div>
  <div class="ns-tagline">Choose your glory</div>
  <div class="form-card">
    <div>
      <label class="field-label">Your name</label>
      <input type="text" id="nameInput" placeholder="Enter your name" autocomplete="off"/>
    </div>
    <div>
      <label class="field-label">Department</label>
      <select id="deptSelect">
        <option value="">— Select department —</option>
        <option>Cyber Security</option><option>EIE</option>
        <option>CSE-1</option><option>CSE-2</option><option>CSE-3</option>
        <option>Mechanical Engineering</option>
        <option>ECE-1</option><option>ECE-2</option><option>ECE-3</option>
        <option>AI DS-1</option><option>AI DS-2</option>
        <option>Agri and Civil</option><option>EEE</option>
        <option>Medical Electronics</option>
        <option>IT-1</option><option>IT-2</option>
      </select>
    </div>
    <button class="start-btn" onclick="enterDirectory()">▶ ENTER THE QUEST</button>
  </div>
</div>

<!-- DIRECTORY SCREEN -->
<div id="directoryScreen">
  <div class="header">
    <div class="header-top">
      <div class="logo-wrap">
        <div class="logo">Puzzle Quest</div>
        <div class="sub">Directory</div>
      </div>
      <div class="player-chip" onclick="switchPlayer()">
        <div class="player-avatar" id="avatarEl">?</div>
        <div class="player-name" id="playerNameEl">Player</div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search puzzles…" autocomplete="off" oninput="render()"/>
    </div>
    <div class="tabs" role="tablist">
      <button class="tab active" data-cat="all"        onclick="setTab(this)">✦ All</button>
      <button class="tab"        data-cat="quotes"     onclick="setTab(this)">Quotes</button>
      <button class="tab"        data-cat="jokes"      onclick="setTab(this)">Jokes</button>
      <button class="tab"        data-cat="comics"     onclick="setTab(this)">Comics</button>
      <button class="tab"        data-cat="thirukural" onclick="setTab(this)">Thirukkural</button>
    </div>
  </div>

  <div class="progress-crown">
    <div class="progress-crown-row">
      <span class="progress-crown-label">👑 Quest progress</span>
      <span class="progress-crown-val" id="overallVal">0 / 0</span>
    </div>
    <div class="bar-track"><div class="bar-fill" id="overallFill" style="width:0%"></div></div>
  </div>

  <div id="content"></div>
  <div class="footer">Puzzle Quest · Solve them all · Glory awaits</div>
</div>

<script src="puzzles.js"></script>
<script>
const PUZZLE_FILE = "puzzle.html";
const CAT_META = {
  quotes:     { label:"Quotes",      icon:"💬", watermark:"Q", cls:"l-quotes"     },
  jokes:      { label:"Jokes",       icon:"😄", watermark:"J", cls:"l-jokes"      },
  comics:     { label:"Comics",      icon:"🎨", watermark:"C", cls:"l-comics"     },
  thirukural: { label:"Thirukkural", icon:"📖", watermark:"த", cls:"l-thirukural" },
};

let playerName="", playerDept="", activeTab="all";

function getProgress(){try{return JSON.parse(localStorage.getItem("pq_progress")||"{}")}catch(e){return{}}}
function markDone(id){const p=getProgress();p[id]=true;localStorage.setItem("pq_progress",JSON.stringify(p))}

function enterDirectory(){
  const n=document.getElementById("nameInput").value.trim();
  const d=document.getElementById("deptSelect").value;
  if(!n){alert("Enter your name!");return}
  if(!d){alert("Select your department!");return}
  playerName=n;playerDept=d;
  localStorage.setItem("pq_name",n);localStorage.setItem("pq_dept",d);

  /* If puzzle.html bounced them here, send them straight back */
  const redirect=sessionStorage.getItem("pq_redirect");
  if(redirect){
    sessionStorage.removeItem("pq_redirect");
    location.href="puzzle.html"+redirect;
    return;
  }

  document.getElementById("nameScreen").style.display="none";
  document.getElementById("directoryScreen").style.display="block";
  document.getElementById("playerNameEl").textContent=n;
  document.getElementById("avatarEl").textContent=n[0].toUpperCase();
  updateOverall();render();
}

function switchPlayer(){
  if(!confirm("Switch player? This will take you back to the name screen."))return;
  document.getElementById("directoryScreen").style.display="none";
  document.getElementById("nameScreen").style.display="flex";
}

function setTab(el){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");activeTab=el.dataset.cat;render();
}

function updateOverall(){
  const done=getProgress();
  const total=PUZZLES.length;
  const solved=PUZZLES.filter(p=>done[p.id]).length;
  document.getElementById("overallVal").textContent=`${solved} / ${total} solved`;
  document.getElementById("overallFill").style.width=(solved/total*100)+"%";
}

function buildLink(p){
  const idx=PUZZLES.findIndex(x=>x.id===p.id);
  const prev=idx>0?PUZZLES[idx-1].id:"";
  const next=idx<PUZZLES.length-1?PUZZLES[idx+1].id:"";
  const params=new URLSearchParams({
    id:p.id,title:p.title,author:p.author,imageUrl:p.imageUrl,
    cols:p.cols,rows:p.rows,category:p.category,difficulty:p.difficulty,
    playerName,playerDept,prevId:prev,nextId:next
  });
  return `${PUZZLE_FILE}?${params}`;
}

function render(){
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  const done=getProgress();
  const filtered=PUZZLES.filter(p=>{
    const matchCat=activeTab==="all"||p.category===activeTab;
    const matchQ=!q||p.title.toLowerCase().includes(q)||p.author.toLowerCase().includes(q);
    return matchCat&&matchQ;
  });

  let html="";
  if(activeTab==="all"){
    const byCat={};
    filtered.forEach(p=>{(byCat[p.category]=byCat[p.category]||[]).push(p)});
    ["quotes","jokes","comics","thirukural"].forEach(cat=>{
      if(!byCat[cat]?.length)return;
      const m=CAT_META[cat];
      const catDone=byCat[cat].filter(p=>done[p.id]).length;
      html+=`<div class="section-label">
        <span class="section-label-text ${m.cls}">${m.icon} ${m.label}</span>
        <span class="section-count">${catDone}/${byCat[cat].length} done</span>
      </div>
      <div class="puzzle-list">`+byCat[cat].map((p,i)=>cardHTML(p,done[p.id],i)).join("")+`</div>`;
    });
    if(!filtered.length) html=emptyHTML();
  } else {
    html=`<div class="puzzle-list" style="margin-top:10px">`;
    html+=filtered.length?filtered.map((p,i)=>cardHTML(p,done[p.id],i)).join(""):emptyHTML();
    html+=`</div>`;
  }
  document.getElementById("content").innerHTML=html;
  updateOverall();
}

function cardHTML(p,isDone,idx){
  const pieces=p.cols*p.rows;
  const delay=Math.min(idx*0.05,0.4);
  const m=CAT_META[p.category];
  return `<a class="puzzle-card cat-${p.category}" href="${buildLink(p)}" style="animation-delay:${delay}s">
    <div class="card-face cat-${p.category}">
      <div class="card-watermark">${m.watermark}</div>
      <div class="card-top">
        <div class="card-title">${p.title}</div>
        <div class="done-badge">${isDone?"✅":"▶"}</div>
      </div>
      <div class="card-author">${p.author}</div>
      <div class="card-footer">
        <span class="diff-pill diff-${p.difficulty}">${p.difficulty}</span>
        <span class="pieces-tag">${pieces} pieces</span>
      </div>
    </div>
  </a>`;
}

function emptyHTML(){
  return`<div class="empty"><div class="empty-icon">🧩</div><p>No puzzles match your search.</p></div>`;
}

(function init(){
  const n=localStorage.getItem("pq_name");
  const d=localStorage.getItem("pq_dept");
  if(n&&d){
    playerName=n;playerDept=d;
    document.getElementById("nameInput").value=n;
    document.getElementById("deptSelect").value=d;
    document.getElementById("nameScreen").style.display="none";
    document.getElementById("directoryScreen").style.display="block";
    document.getElementById("playerNameEl").textContent=n;
    document.getElementById("avatarEl").textContent=n[0].toUpperCase();
    updateOverall();render();
    const justSolved=new URLSearchParams(location.search).get("solved");
    if(justSolved){markDone(justSolved);updateOverall();render()}
  }
})();
</script>
</body>
</html>
